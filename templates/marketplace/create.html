{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-slate-900 rounded-xl shadow-lg border border-slate-800 p-6">
  <h2 class="text-2xl font-bold text-yellow-300 mb-4">Publicar artículo en el Marketplace</h2>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="w-full px-4 py-2 bg-yellow-400 text-slate-900 font-semibold rounded-lg shadow hover:bg-yellow-300 transition">Publicar</button>
  </form>
  <a href="{% url 'marketplace:list' %}" class="inline-block mt-4 px-4 py-2 bg-slate-800 text-slate-200 rounded hover:bg-slate-700 transition">Volver al Marketplace</a>
</div>
{% endblock %}
