<!-- resume/partials/item_compare_modal.html -->
<div class="fixed inset-0 flex items-center justify-center z-50 bg-black bg-opacity-50" x-show="openItemModal" x-transition>
  <div class="bg-white dark:bg-slate-800 rounded-lg shadow-lg w-full max-w-xl p-6 relative">
    <button @click="openItemModal = false" class="absolute top-2 right-2 text-gray-400 hover:text-gray-700">&times;</button>
    <h2 class="text-lg font-semibold mb-4">Comparar {{ typeLabel }}</h2>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-1">Actual:</label>
      <div class="p-2 border rounded bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-200">
        <template x-for="(v, k) in currentItem" :key="k">
          <div><span class="font-semibold" x-text="k"></span>: <span x-text="v"></span></div>
        </template>
      </div>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-1">Extraído:</label>
      <div class="p-2 border rounded bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200">
        <template x-for="(v, k) in extractedItem" :key="k">
          <div><span class="font-semibold" x-text="k"></span>: <span x-text="v"></span></div>
        </template>
      </div>
    </div>
    <div class="flex justify-end gap-2">
      <button @click="chooseItem('current')" class="px-4 py-2 rounded bg-slate-600 text-white hover:bg-slate-700">Mantener actual</button>
      <button @click="chooseItem('extracted')" class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">Usar extraído</button>
    </div>
  </div>
</div>
