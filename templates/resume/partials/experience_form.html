<form
    hx-post="{% if form.instance.pk %}{% url 'edit_experience' form.instance.pk %}{% else %}{% url 'add_experience' %}{% endif %}"
    hx-target="{% if form.instance.pk %}this{% else %}#experience-list{% endif %}"
    hx-swap="{% if form.instance.pk %}outerHTML{% else %}beforeend{% endif %}" {% if not form.instance.pk %}
    hx-on::after-request="this.reset()" {% endif %}
    class="glass-panel p-4 rounded-lg mb-4 space-y-4 border border-blue-500/50">

    {% csrf_token %}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Cargo</label>
            {{ form.job_title }}
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Empresa</label>
            {{ form.company }}
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Ubicación</label>
            {{ form.location }}
        </div>
        <div class="flex items-center pt-6">
            <label class="flex items-center space-x-2 text-slate-300 cursor-pointer">
                {{ form.is_current }}
                <span>Trabajo actual</span>
            </label>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Inicio</label>
            {{ form.start_date }}
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Fin</label>
            {{ form.end_date }}
        </div>
    </div>

    <div>
        <div class="flex justify-between items-center mb-1">
            <label class="block text-sm font-medium text-slate-300">Descripción</label>
            <div class="flex items-center gap-2">
                <button type="button" hx-post="{% url 'rewrite_description' %}" hx-target="#id_description"
                    hx-swap="outerHTML" hx-include="closest form" hx-indicator="#ai-spinner"
                    class="text-xs bg-purple-600/20 text-purple-300 hover:bg-purple-600/40 px-2 py-1 rounded flex items-center gap-1 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Mejorar con IA
                </button>
                <div id="ai-spinner" class="htmx-indicator flex items-center gap-1">
                    <svg class="animate-spin h-3 w-3 text-purple-400" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    <span class="text-xs text-purple-400">Generando...</span>
                </div>
            </div>
        </div>
        {{ form.description }}
        <!-- Add ID to textarea for HTMX targeting if Django doesn't render it with a predictable ID, usually id_description -->
        <script>
            // Ensure the textarea has the ID expected by hx-target
            // Django widgets usually have id="id_fieldname"
        </script>
    </div>

    <div class="flex justify-end space-x-3 pt-2">
        {% if form.instance.pk %}
        <button type="button" hx-get="{% url 'resume_edit' %}" hx-select="#experience-{{ form.instance.pk }}"
            hx-target="closest form" hx-swap="outerHTML"
            class="px-3 py-1 text-slate-400 hover:text-white transition-colors">
            Cancelar
        </button>
        {% endif %}
        <button type="submit"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
            Guardar
        </button>
    </div>
</form>
