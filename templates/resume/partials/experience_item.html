<div class="glass-panel p-4 rounded-lg mb-4 experience-item" id="experience-{{ experience.id }}">
    <div class="flex justify-between items-start">
        <div>
            <h4 class="text-white font-semibold text-lg">{{ experience.job_title }}</h4>
            <p class="text-blue-400 font-medium">{{ experience.company }}</p>
            <p class="text-slate-400 text-sm mt-1">
                {{ experience.start_date }} -
                {% if experience.is_current %}
                    Presente
                {% else %}
                    {{ experience.end_date }}
                {% endif %}
                • {{ experience.location }}
            </p>
        </div>
        <div class="flex space-x-2">
            <button hx-get="{% url 'edit_experience' experience.id %}" hx-target="#experience-{{ experience.id }}"
                hx-swap="outerHTML" class="text-slate-400 hover:text-white transition-colors" title="Editar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                    </path>
                </svg>
            </button>
            <button hx-delete="{% url 'delete_experience' experience.id %}" hx-target="#experience-{{ experience.id }}"
                hx-swap="outerHTML" hx-confirm="¿Seguro que deseas eliminar esta experiencia?"
                class="text-slate-400 hover:text-red-400 transition-colors" title="Eliminar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
            </button>
        </div>
    </div>
    {% if experience.description %}
    <p class="text-slate-300 mt-2 text-sm whitespace-pre-line">{{ experience.description }}</p>
    {% endif %}
</div>
