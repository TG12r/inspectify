<!-- Sección de reacciones con selector tipo LinkedIn -->
{% if user.is_authenticated %}
<div class="flex items-center gap-2">
    <!-- Botón principal con dropdown -->
    <div class="relative group">
        {% with user_reaction=post.user_reaction_type|default:None %}
        {% if user_reaction %}
        <!-- Si ya tiene reacción: clic quita, hover muestra selector -->
        <button 
            hx-post="{% url 'toggle_profile_post_reaction' post.id %}" 
            hx-vals='{"reaction_type": "{{ user_reaction }}"}'
            hx-target="#reactions-{{ post.id }}"
            hx-swap="innerHTML"
            onmouseover="showReactionPicker({{ post.id }})"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all
                {% if user_reaction == 'LIKE' %}bg-blue-600/20 text-blue-400 border border-blue-600/30 hover:bg-blue-600/30
                {% elif user_reaction == 'LOVE' %}bg-red-600/20 text-red-400 border border-red-600/30 hover:bg-red-600/30
                {% elif user_reaction == 'CELEBRATE' %}bg-yellow-600/20 text-yellow-400 border border-yellow-600/30 hover:bg-yellow-600/30
                {% elif user_reaction == 'SUPPORT' %}bg-green-600/20 text-green-400 border border-green-600/30 hover:bg-green-600/30
                {% elif user_reaction == 'INSIGHTFUL' %}bg-purple-600/20 text-purple-400 border border-purple-600/30 hover:bg-purple-600/30
                {% endif %}">
            <span class="text-sm">
                {% if user_reaction == 'LIKE' %}👍
                {% elif user_reaction == 'LOVE' %}❤️
                {% elif user_reaction == 'CELEBRATE' %}🎉
                {% elif user_reaction == 'SUPPORT' %}💪
                {% elif user_reaction == 'INSIGHTFUL' %}💡
                {% endif %}
            </span>
            <span>{{ post.reaction_count }}</span>
        </button>
        {% else %}
        <!-- Si no tiene reacción: clic abre selector -->
        <button 
            onclick="toggleReactionPicker({{ post.id }})"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all bg-slate-700/50 text-slate-400 border border-slate-700 hover:border-purple-500 hover:text-purple-400">
            <span class="text-sm">👍</span>
            {% if post.reaction_count > 0 %}
                <span>{{ post.reaction_count }}</span>
            {% else %}
                <span>Reaccionar</span>
            {% endif %}
        </button>
        {% endif %}
        {% endwith %}

        <!-- Selector de reacciones -->
        <div id="reaction-picker-{{ post.id }}" 
             onmouseleave="hideReactionPicker({{ post.id }})"
             class="hidden absolute bottom-full mb-2 left-0 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl p-2 flex gap-1 z-10">
            <button 
                hx-post="{% url 'toggle_profile_post_reaction' post.id %}" 
                hx-vals='{"reaction_type": "LIKE"}'
                hx-target="#reactions-{{ post.id }}"
                hx-swap="innerHTML"
                onclick="hideAllReactionPickers()"
                class="w-10 h-10 rounded-lg hover:bg-slate-700 transition-all transform hover:scale-125 flex items-center justify-center text-xl"
                title="Me gusta">
                👍
            </button>
            <button 
                hx-post="{% url 'toggle_profile_post_reaction' post.id %}" 
                hx-vals='{"reaction_type": "LOVE"}'
                hx-target="#reactions-{{ post.id }}"
                hx-swap="innerHTML"
                onclick="hideAllReactionPickers()"
                class="w-10 h-10 rounded-lg hover:bg-slate-700 transition-all transform hover:scale-125 flex items-center justify-center text-xl"
                title="Me encanta">
                ❤️
            </button>
            <button 
                hx-post="{% url 'toggle_profile_post_reaction' post.id %}" 
                hx-vals='{"reaction_type": "CELEBRATE"}'
                hx-target="#reactions-{{ post.id }}"
                hx-swap="innerHTML"
                onclick="hideAllReactionPickers()"
                class="w-10 h-10 rounded-lg hover:bg-slate-700 transition-all transform hover:scale-125 flex items-center justify-center text-xl"
                title="Celebrar">
                🎉
            </button>
            <button 
                hx-post="{% url 'toggle_profile_post_reaction' post.id %}" 
                hx-vals='{"reaction_type": "SUPPORT"}'
                hx-target="#reactions-{{ post.id }}"
                hx-swap="innerHTML"
                onclick="hideAllReactionPickers()"
                class="w-10 h-10 rounded-lg hover:bg-slate-700 transition-all transform hover:scale-125 flex items-center justify-center text-xl"
                title="Apoyo">
                💪
            </button>
            <button 
                hx-post="{% url 'toggle_profile_post_reaction' post.id %}" 
                hx-vals='{"reaction_type": "INSIGHTFUL"}'
                hx-target="#reactions-{{ post.id }}"
                hx-swap="innerHTML"
                onclick="hideAllReactionPickers()"
                class="w-10 h-10 rounded-lg hover:bg-slate-700 transition-all transform hover:scale-125 flex items-center justify-center text-xl"
                title="Interesante">
                💡
            </button>
        </div>
    </div>
</div>

<script>
function toggleReactionPicker(postId) {
    const picker = document.getElementById(`reaction-picker-${postId}`);
    picker.classList.toggle('hidden');
}

function showReactionPicker(postId) {
    const picker = document.getElementById(`reaction-picker-${postId}`);
    picker.classList.remove('hidden');
}

function hideReactionPicker(postId) {
    setTimeout(() => {
        const picker = document.getElementById(`reaction-picker-${postId}`);
        picker.classList.add('hidden');
    }, 200);
}

function hideAllReactionPickers() {
    document.querySelectorAll('[id^="reaction-picker-"]').forEach(picker => {
        picker.classList.add('hidden');
    });
}
</script>
{% else %}
<!-- Usuario no autenticado -->
<div class="flex items-center gap-2">
    <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-700/50 text-slate-400 border border-slate-700">
        <span class="text-sm">👍</span>
        <span>{{ post.reaction_count }}</span>
    </span>
</div>
{% endif %}
