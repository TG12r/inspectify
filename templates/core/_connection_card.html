<a href="{% url 'public_profile' profile.slug %}"
    class="block glass-panel p-4 rounded-xl hover:border-purple-500/50 transition-colors group">
    <div class="flex items-center gap-3">
        {% if profile.avatar %}
        <img src="{{ profile.avatar.url }}" class="w-12 h-12 rounded-full object-cover">
        {% else %}
        <div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
        </div>
        {% endif %}
        <div>
            <h4 class="font-semibold text-white group-hover:text-purple-400 transition-colors">
                {{ profile.user.get_full_name|default:profile.user.username }}
            </h4>
            <p class="text-xs text-slate-400">{{ profile.title|default:"Inspector" }}</p>
            {% if profile.location %}
            <p class="text-xs text-slate-500 mt-0.5">📍 {{ profile.location }}</p>
            {% endif %}
        </div>
    </div>
</a>
