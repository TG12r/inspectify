<form onsubmit="shareJob(event)" action="{% url 'share_job_to_communities' job.id %}" method="post">
    {% csrf_token %}
    
    <div class="mb-4">
        <label class="block text-sm font-medium text-slate-300 mb-2">Comentario (opcional)</label>
        <textarea name="comment" rows="3" 
            class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-slate-300 placeholder-slate-500 text-sm resize-none focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
            placeholder="Agrega un comentario sobre esta oferta..."></textarea>
    </div>

    <div class="mb-6">
        <label class="block text-sm font-medium text-slate-300 mb-3">Selecciona comunidades</label>
        {% if communities %}
        <div class="space-y-2 max-h-64 overflow-y-auto">
            {% for community in communities %}
            <label class="flex items-center gap-3 p-3 bg-slate-800/50 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors">
                <input type="checkbox" name="communities" value="{{ community.id }}" 
                    class="w-4 h-4 text-purple-600 bg-slate-700 border-slate-600 rounded focus:ring-purple-500">
                <div class="flex-1">
                    <p class="text-white font-medium text-sm">{{ community.name }}</p>
                    <p class="text-slate-400 text-xs">{{ community.get_category_display }} • {{ community.member_count }} miembros</p>
                </div>
            </label>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-8 text-slate-400">
            <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <p class="mb-2">No eres miembro de ninguna comunidad</p>
            <a href="{% url 'community_list' %}" class="text-purple-400 hover:text-purple-300 text-sm">
                Explora comunidades →
            </a>
        </div>
        {% endif %}
    </div>

    {% if communities %}
    <div class="flex justify-end gap-3">
        <button type="button" onclick="closeShareModal()"
            class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors">
            Cancelar
        </button>
        <button type="submit"
            class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition-colors">
            Compartir
        </button>
    </div>
    {% endif %}
</form>
